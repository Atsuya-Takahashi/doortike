services:
  - type: web
    name: live-events-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
